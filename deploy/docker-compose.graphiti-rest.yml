services:
  graphiti-rest:
    image: ${GRAPHITI_IMAGE:?set GRAPHITI_IMAGE}
    container_name: graphiti-rest
    restart: unless-stopped
    ports:
      - '${GRAPHITI_PORT:-8000}:8000'
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      NEO4J_URI: bolt://neo4j:${NEO4J_PORT:-7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      PORT: '8000'
      db_backend: neo4j
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  neo4j:
    image: neo4j:5.26.2
    container_name: graphiti-neo4j
    restart: unless-stopped
    ports:
      - '${NEO4J_HTTP_PORT:-7474}:7474'
      - '${NEO4J_PORT:-7687}:7687'
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:7474 || exit 1',
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

volumes:
  neo4j_data:
